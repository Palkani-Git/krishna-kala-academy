<header class="navbar" [class.scrolled]="isScrolled()">

    <div class="container">

        <!-- Logo -->
        <div class="logo">

            <img src="assets/images/kka-logo.png" alt="Sri Krishna Educational Academy Logo" class="logo-img">

            <div class="logo-text">

                <span class="logo-main">

                    Sri Krishna

                </span>

                <span class="logo-sub">

                    Educational Academy

                </span>

            </div>

        </div>

        <!-- Desktop Menu -->
        <nav class="nav-links">

            @for(item of menuItems; track item.label){

            <a [href]="item.link">
                {{item.label}}
            </a>

            }

        </nav>

        <!-- Register Button -->
        <a href="#registration" class="register-btn">
            Register Now
        </a>

        <!-- Mobile Menu -->

        <button class="menu-btn" (click)="toggleMenu()">

            @if(!isMenuOpen()){

            ☰

            }@else{

            ✕

            }

        </button>

    </div>

</header>

@if(isMenuOpen()){

<div class="mobile-menu">

    @for(item of menuItems; track item.label){

    <a [href]="item.link" (click)="toggleMenu()">

        {{item.label}}

    </a>

    }

</div>

}
